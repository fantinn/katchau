<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Tinpay" />
  <title>Tinpay · Controle Financeiro</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="icon" type="image/png" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles-new.css" />
</head>
<body>
  <div id="app">
    <!-- Database selection screen -->
    <div id="db-select" class="hidden">
      <div class="db-select-container">
        <div class="db-select-logo">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <rect width="48" height="48" rx="14" fill="#2563EB"/>
            <path d="M14 28l8-8 6 6 8-10" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="34" cy="16" r="3" fill="#60A5FA"/>
          </svg>
          <span>tinpay</span>
        </div>
        <h2>Selecione o banco de dados</h2>
        <div class="db-buttons">
          <button class="db-btn" data-db="fantin">
            <span class="db-icon">👤</span>
            <span class="db-name">Fantin</span>
          </button>
          <button class="db-btn" data-db="maria">
            <span class="db-icon">👩</span>
            <span class="db-name">Maria</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Splash / loading -->
    <div id="splash">
      <div class="splash-logo">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect width="48" height="48" rx="14" fill="#2563EB"/>
          <path d="M14 28l8-8 6 6 8-10" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="34" cy="16" r="3" fill="#60A5FA"/>
        </svg>
        <span>tinpay</span>
      </div>
    </div>

    <!-- Main layout -->
    <div id="main" class="hidden">
      <!-- Bottom nav -->
      <nav class="bottom-nav" id="bottomNav">
        <button class="nav-item active" data-view="dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span>Resumo</span>
        </button>
        <button class="nav-item" data-view="income">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          <span>Ganhos</span>
        </button>
        <button class="nav-item" data-view="expenses">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
          <span>Gastos</span>
        </button>
      </nav>

      <!-- Views -->
      <div id="views">
        <div id="view-dashboard" class="view active"></div>
        <div id="view-income" class="view"></div>
        <div id="view-expenses" class="view"></div>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Modal container -->
  <div id="modal-overlay" class="hidden">
    <div id="modal-box"></div>
  </div>

  <script src="storage-new.js"></script>
  <script src="dashboard-new.js"></script>
  <script src="income-new.js"></script>
  <script src="expenses-new.js"></script>
  <script src="app-new.js"></script>
  <script>
    // Registrar Service Worker para PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(() => {
        console.log('Service Worker registrado');
      }).catch((err) => {
        console.log('Service Worker falhou:', err);
      });
    }
  </script>
</body>
</html>
