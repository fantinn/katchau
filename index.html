<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2563EB" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Finara · Controle Financeiro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Database selection screen -->
    <div id="db-select" class="hidden">
      <div class="db-select-container">
        <div class="db-select-logo">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <rect width="48" height="48" rx="14" fill="#2563EB"/>
            <path d="M14 28l8-8 6 6 8-10" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="34" cy="16" r="3" fill="#60A5FA"/>
          </svg>
          <span>tinpay</span>
        </div>
        <h2>Selecione o banco de dados</h2>
        <div class="db-buttons">
          <button class="db-btn" data-db="fantin">
            <span class="db-icon">👤</span>
            <span class="db-name">Fantin</span>
          </button>
          <button class="db-btn" data-db="maria">
            <span class="db-icon">👩</span>
            <span class="db-name">Maria</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Splash / loading -->
    <div id="splash">
      <div class="splash-logo">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect width="48" height="48" rx="14" fill="#2563EB"/>
          <path d="M14 28l8-8 6 6 8-10" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="34" cy="16" r="3" fill="#60A5FA"/>
        </svg>
        <span>tinpay</span>
      </div>
    </div>

    <!-- Main layout -->
    <div id="main" class="hidden">
      <!-- Bottom nav -->
      <nav class="bottom-nav" id="bottomNav">
        <button class="nav-item active" data-view="dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span>Dashboard</span>
        </button>
        <button class="nav-item" data-view="transactions">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
          <span>Gastos</span>
        </button>
        <button class="nav-item nav-import" data-view="import">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
          <span>Importar</span>
        </button>
        <button class="nav-item" data-view="analytics">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          <span>Análise</span>
        </button>
        <button class="nav-item" data-view="schedule">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span>Programação</span>
        </button>
        <button class="nav-item" data-view="settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          <span>Config</span>
        </button>
      </nav>

      <!-- Views -->
      <div id="views">
        <div id="view-dashboard" class="view active"></div>
        <div id="view-transactions" class="view"></div>
        <div id="view-import" class="view"></div>
        <div id="view-analytics" class="view"></div>
        <div id="view-schedule" class="view"></div>
        <div id="view-settings" class="view"></div>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Modal container -->
  <div id="modal-overlay" class="hidden">
    <div id="modal-box"></div>
  </div>

  <script src="storage.js"></script>
  <script src="categories.js"></script>
  <script src="engine.js"></script>
  <script src="charts.js"></script>
  <script src="dashboard.js"></script>
  <script src="transactions.js"></script>
  <script src="import.js"></script>
  <script src="analytics.js"></script>
  <script src="settings.js"></script>
  <script src="schedule.js"></script>
  <script src="app.js"></script>
</body>
</html>
